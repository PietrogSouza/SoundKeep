<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        html,
        body {
            background-color: #0a0a0a !important;
            color: #fff;
            min-height: 100vh;

        }

        body {
            padding: 40px 20px;
        }

        .box {
            background-color: #1a1a1a;
            border: 1px solid #2d2d2d;
            height: 400px;
            padding: 20px;
            border-radius: 10px;
            width: 500px;
            margin: 200px auto;
            transition: all 0.3s ease;
        }

        .box:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);

        }

        h2 {
            text-align: center;
            padding: 20px;
            color: blue;
            font-size: 30px;
            padding: 10px;
            text-shadow: 0 0 5px #0004ff, 0 0 8px #1100ff, 0 0 40px #001aff;
        }

        button {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 30px;
            padding: 10px;
            border-radius: 10px;
            width: 452px;
            justify-content: center;
            color: white;
            background-color: blue;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;

        }

        button:hover {
            background-color: rgb(1, 1, 206);
            transform: scale(1.02);
        }

        div {
            padding: 5px;
        }

        label {
            color: white;
            margin: 5px;
            font-weight: 600;
        }

        input {
            border: 1px solid #0f60bd;
            transition: all 0.3s ease-in-out;
            background-color: #2d2d2d;
            border-color: #4d8bff;
            color: #fff;
            padding: 8px;
            border-radius: 10px;
            width: 440px;
        }

        input:focus {
            border-color: #205bc9;
            box-shadow: 0 0 8px rgba(12, 133, 214, 0.5);
            padding-left: 15px;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>LOGIN</h2>
        {% with mensagens = get_flashed_messages()%}
            {% for Mensagem in mensagens%}
        <div>
            <h3>
                Mensagem
            </h3>
        </div>
            {% endfor %}
        {% endwith %}
        <form action="/usuario/Login" method="post">
            <div>
                <label>USUÁRIO</label>
                <div>
                    <input class="input" name="usuario_cadastro" type="text" placeholder="Digite seu Usuário">
                </div>
            </div>
            <div>
                <label>SENHA</label>
                <div>
                    <input class="input" type="password" name="senha_cadastro" type="text"
                        placeholder="Digite sua Senha">
                </div>
            </div>
            <div>
                <button type="submit">
                    <strong>LOGAR</strong>
                </button>
            </div>
        </form>
    </div>
</body>

</html>
